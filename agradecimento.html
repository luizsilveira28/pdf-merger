<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiqueta de Agradecimento - Gerador de Etiquetas</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="breadcrumb">
        <a href="index.html">← Voltar</a>
    </nav>
    
    <h1>🎁 Etiqueta de Agradecimento</h1>
    <div class="container">
        <div class="layout-split">
            <div class="controls">
                <label>Escolha um ícone:</label>
                <div class="icon-selector" id="iconSelector">
                    <!-- Carregado dinamicamente -->
                </div>

                <label>Texto de agradecimento:</label>
                <input type="text" id="thankYouText" placeholder="Ex: Obrigado Elaine" value="Obrigado!">
            </div>

            <div class="preview-side">
                <label>Prévia:</label>
                <div class="preview-container">
                    <div class="thank-you-label" id="labelPreview">
                        <div class="label-icon" id="previewIcon">
                            <img src="images/Harry-Potter-Glasses.png" alt="Harry Potter" width="80">
                        </div>
                        <div class="label-text" id="previewText">Obrigado!</div>
                    </div>
                </div>

                <div class="btn-row">
                    <button id="imprimirBtn" class="hide-mobile">🖨️ Imprimir</button>
                    <button id="downloadLabelBtn">📄 Gerar PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="js/icon-data.js"></script>
    <script src="js/thank-you.js"></script>
</body>
</html>
