<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquetas Shopee - Correios - Gerador de Etiquetas</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#FF6B35">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/global.js" defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6461956943917786" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="breadcrumb">
        <a href="index.html">← Voltar</a>
    </nav>
    
    <h1>🏷️ Etiquetas Shopee - Correios</h1>
    <div class="container">
        <div class="layout-split">
            <div class="controls">
                <label id="pdfInputLabel">Selecione os PDFs das etiquetas:</label>
                <div class="file-input-wrapper" id="dropZone" role="button" aria-labelledby="pdfInputLabel" tabindex="0">
                    <div class="drop-zone-content">
                        <span class="drop-icon" aria-hidden="true">📁</span>
                        <span class="drop-text">Arraste PDFs aqui ou clique para selecionar</span>
                        <span class="drop-text-mobile">Toque para selecionar PDFs</span>
                    </div>
                    <input type="file" id="pdfInput" accept=".pdf" multiple aria-labelledby="pdfInputLabel">
                </div>
                
                <div class="pdf-list" id="pdfList" style="display: none;">
                    <div class="pdf-list-header">
                        <span id="pdfCount">0 arquivos</span>
                        <button type="button" class="btn-link" id="clearAll">Limpar todos</button>
                    </div>
                    <ul id="pdfItems"></ul>
                </div>
                
                <div class="options">
                    <label class="radio-label">
                        <input type="radio" name="format" value="thermal" checked>
                        <span>Etiquetadora Térmica (100x150mm)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="format" value="a4">
                        <span>Folha A4</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="format" value="single">
                        <span>Etiqueta Única (2 em 1)</span>
                    </label>
                </div>
            </div>

            <div class="preview-side">
                <label>Pré-visualização: <span id="previewFileName"></span></label>
                <div class="preview-container pdf-preview-container">
                    <div class="pdf-preview-placeholder" id="pdfPreviewPlaceholder">
                        <span>📄</span>
                        <p>Selecione um PDF</p>
                    </div>
                    <canvas id="pdfPreviewCanvas" style="display: none;"></canvas>
                </div>
                <div class="pdf-page-nav" id="pdfPageNav" style="display: none;">
                    <button type="button" id="prevPage">←</button>
                    <span id="pageInfo">1 / 1</span>
                    <button type="button" id="nextPage">→</button>
                </div>
                
                <div class="btn-row">
                    <button id="imprimirBtn" class="hide-mobile" disabled aria-label="Imprimir etiquetas">🖨️ Imprimir</button>
                    <button id="processBtn" disabled aria-label="Processar e baixar PDF">📄 Processar e Baixar</button>
                </div>
                <div class="status" id="status" role="status" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <!-- Modal de Zoom -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Visualização ampliada">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Fechar visualização">✕</button>
            <div class="modal-canvas-container">
                <canvas id="modalCanvas"></canvas>
            </div>
            <div class="modal-nav">
                <button type="button" id="modalPrevPage">←</button>
                <span id="modalPageInfo">1 / 1</span>
                <button type="button" id="modalNextPage">→</button>
            </div>
            <div class="modal-zoom">
                <button type="button" id="zoomOut">−</button>
                <span id="zoomLevel">100%</span>
                <button type="button" id="zoomIn">+</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="js/thermal.js"></script>
    <script src="js/a4.js"></script>
    <script src="js/single.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
